name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          # Install the lightweight providers only — llama-cpp-python (the
          # `local` extra) is heavy and the local-model tests skip without a GGUF.
          pip install -e ".[openai,anthropic,dev]"

      - name: Run tests
        run: pytest

  lint:
    name: lint (informational)
    runs-on: ubuntu-latest
    # Style/type findings shouldn't block merges yet — surface them without failing.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: black --check
        run: black --check src tests
      - name: isort --check
        run: isort --check-only src tests
      - name: flake8
        run: flake8 src tests
      - name: mypy
        run: mypy src/pymrsf
